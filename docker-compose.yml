version: '3.9'

services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: horizon_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: horizon_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - .:/app